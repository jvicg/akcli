  - repo: local
    hooks:
      # Run unit test if python relevant file is modified (before commit)
      - id: pytest-unit
        name: Run unit tests
        entry: pytest tests/unit/
        language: system
        types: [python]
        stages: [pre-commit]

      # Run full test suite before pushing to remote
      - id: pytest-full
        name: Run full test suite
        entry: pytest tests/
        language: system
        types: [python]
        stages: [pre-push]
